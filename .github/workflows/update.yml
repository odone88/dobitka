name: Aktualizuj Dobitka co 2h

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:  # możliwość ręcznego odpalenia

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Generuj HTML
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python generate.py

      - name: Wrzuć index.html na GitHub Pages
        run: |
          git config user.name "dobitka-bot"
          git config user.email "bot@dobitka.pl"
          git add index.html
          git diff --cached --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
